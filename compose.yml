services:
  voice-server-backend:
    container_name: voice-server-backend
    build:
      context: .
      dockerfile: Dockerfile
    image: voice-server-backend:latest
    env_file:
      - .env
    environment:
      SERVER_PORT: ${SERVER_PORT:-11953}
    ports:
      - "${SERVER_PORT:-11953}:${SERVER_PORT:-11953}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$$SERVER_PORT/actuator/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - zenmind-network

  voice-server-frontend:
    container_name: voice-server-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: voice-server-frontend:latest
    depends_on:
      voice-server-backend:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT:-11953}
    ports:
      - "${FRONTEND_PORT:-11954}:80"
    restart: unless-stopped
    networks:
      - zenmind-network

networks:
  zenmind-network:
    external: true
